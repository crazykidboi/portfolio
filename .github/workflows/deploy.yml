name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# (Optional) If you ever DO need to force an env var across the whole workflow, 
# this is where you put it!
# env:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
        
      # FIX: Upgraded to v4 to resolve the Node 20 deprecation warning
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Approve Builds
        run: pnpm approve-builds
        
      - name: Install, build, and upload your site
        uses: withastro/action@v5
        with:
          node-version: 24
          package-manager: pnpm@latest
          build-cmd: pnpm run build
          # Removed the locally-scoped env variable from here

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4